<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Loyo — Loyalty Card</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="pole" aria-hidden="true"><div class="pole-stripes"></div><div class="pole-cap top"></div><div class="pole-cap bottom"></div></div>
    <div class="header-text">
      <h1>LOYO</h1>
      <p class="tagline">Loyalty Card</p>
    </div>
  </header>

  <main id="app">

    <!-- LOGIN -->
    <section id="login-view" class="card">
      <p class="eyebrow">Check in</p>
      <h2>What's your number?</h2>
      <p class="muted">Enter your phone number to see your stamps and rewards.</p>
      <form id="login-form">
        <input id="phone-input" type="tel" inputmode="tel" placeholder="+60123456789" autocomplete="tel" required />
        <button type="submit" class="primary">Continue</button>
      </form>
    </section>

    <!-- PROFILE -->
    <section id="profile-view" class="card hidden">
      <div class="profile-head">
        <div>
          <p class="eyebrow">Member</p>
          <p id="profile-phone" class="phone-display"></p>
        </div>
        <button id="logout-btn" class="link-btn">Switch number</button>
      </div>

      <div id="checkin-note" class="checkin-note hidden"></div>

      <div class="ticket">
        <div class="ticket-notch left"></div>
        <div class="ticket-notch right"></div>
        <div id="stamps-grid" class="stamps-grid"></div>
        <p id="progress-text" class="progress-text"></p>
      </div>

      <button id="redeem-btn" class="primary hidden">Redeem free haircut</button>

      <div class="history-block">
        <p class="eyebrow">Recent activity</p>
        <ul id="history-list" class="history-list"></ul>
      </div>

      <button id="staff-toggle" class="link-btn subtle">Staff — add a stamp</button>
    </section>

  </main>

  <footer class="site-footer">
    <p>Show this screen to your barber after every visit.</p>
  </footer>

  <!-- PIN MODAL -->
  <div id="pin-modal" class="modal hidden">
    <div class="modal-card">
      <p class="eyebrow">Staff only</p>
      <h3 id="pin-title">Enter staff PIN</h3>
      <input id="pin-input" type="password" inputmode="numeric" maxlength="6" placeholder="••••" />
      <p id="pin-error" class="error hidden">Incorrect PIN. Try again.</p>
      <div class="modal-actions">
        <button id="pin-cancel" class="ghost">Cancel</button>
        <button id="pin-confirm" class="primary">Confirm</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
